<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Snake Game</title>
    <a href="../index.html">Home</a>  |  
    <a href="about.html">About</a>  |
    <a href="#!">Snake Game</a>
    <style>
        :root {
            --bg-color: #E7FFCE;
            --board-light: #AAD751;
            --board-dark: #A2D149;
            --snake-head: #4E7CF6;
            --snake-body: #578A32;
            --apple: #E91E63;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            background-color: var(--board-light);
        }

        #score-board {
            width: 100%;
            background-color: #4A752C;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
        }

        canvas {
            display: block;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 12px 30px;
            font-size: 20px;
            background-color: #ffffff;
            color: #4A752C;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">
            <span id="apple-icon" style="margin-right: 10px;">🍎</span>
            <span id="score">0</span>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div id="start-screen" class="overlay">
            <h1 style="margin-bottom: 20px;">SNAKE</h1>
            <button onclick="startGame()">Play Game</button>
        </div>

        <div id="game-over-screen" class="overlay hidden">
            <h2 style="margin-bottom: 10px;">Game Over!</h2>
            <button onclick="startGame()">Try Again</button>
        </div>
    </div>

    <p style="margin-top: 20px; opacity: 0.8;">Use Arrow Keys to Turn</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const startScreen = document.getElementById("start-screen");
        const gameOverScreen = document.getElementById("game-over-screen");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let dx = 0;
        let dy = 0;
        let snake = [];
        let apple = { x: 5, y: 5 };
        let gameSpeed = 200;
        let gameLoop;

        function startGame() {
            // Reset variables
            snake = [
                { x: 10, y: 10 },
                { x: 10, y: 11 },
                { x: 10, y: 12 }
            ];
            dx = 0;
            dy = -1;
            score = 0;
            scoreElement.innerText = score;
            
            startScreen.classList.add("hidden");
            gameOverScreen.classList.add("hidden");

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(draw, gameSpeed);
        }

        function draw() {
            moveSnake();
            if (checkGameOver()) return;

            drawBoard();
            drawApple();
            drawSnake();
        }

        function drawBoard() {
            for (let row = 0; row < tileCount; row++) {
                for (let col = 0; col < tileCount; col++) {
                    if ((row + col) % 2 === 0) {
                        ctx.fillStyle = "#AAD751";
                    } else {
                        ctx.fillStyle = "#A2D149";
                    }
                    ctx.fillRect(col * gridSize, row * gridSize, gridSize, gridSize);
                }
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // Head is a different color
                ctx.fillStyle = index === 0 ? "#4E7CF6" : "#578A32";
                
                // Rounded snake body
                ctx.beginPath();
                ctx.roundRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2, 5);
                ctx.fill();

                // Add eyes to the head
                if (index === 0) {
                    ctx.fillStyle = "white";
                    ctx.beginPath();
                    ctx.arc(part.x * gridSize + 6, part.y * gridSize + 6, 2, 0, Math.PI * 2);
                    ctx.arc(part.x * gridSize + 14, part.y * gridSize + 6, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function moveSnake() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head);

            if (head.x === apple.x && head.y === apple.y) {
                score += 1;
                scoreElement.innerText = score;
                placeApple();
            } else {
                snake.pop();
            }
        }

        function placeApple() {
            apple.x = Math.floor(Math.random() * tileCount);
            apple.y = Math.floor(Math.random() * tileCount);
            
            // Don't spawn apple on snake body
            snake.forEach(part => {
                if (part.x === apple.x && part.y === apple.y) placeApple();
            });
        }

        function drawApple() {
            ctx.fillStyle = "#E91E63";
            ctx.beginPath();
            ctx.arc(apple.x * gridSize + gridSize/2, apple.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Leaf
            ctx.fillStyle = "#4A752C";
            ctx.fillRect(apple.x * gridSize + gridSize/2 - 1, apple.y * gridSize + 2, 2, 4);
        }

        function checkGameOver() {
            const head = snake[0];
            
            // Wall collision
            const hitWall = head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount;
            
            // Self collision
            let hitSelf = false;
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) hitSelf = true;
            }

            if (hitWall || hitSelf) {
                clearInterval(gameLoop);
                gameOverScreen.classList.remove("hidden");
                return true;
            }
            return false;
        }

        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp": if (dy !== 1) { dx = 0; dy = -1; } break;
                case "ArrowDown": if (dy !== -1) { dx = 0; dy = 1; } break;
                case "ArrowLeft": if (dx !== 1) { dx = -1; dy = 0; } break;
                case "ArrowRight": if (dx !== -1) { dx = 1; dy = 0; } break;
            }
        });
    </script>
</body>
</html>
